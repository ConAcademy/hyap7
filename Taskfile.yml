version: '3'

tasks:
  default:
    desc: 'Default task is to "build"'
    deps: [build]

  list:
    desc: 'Lists available tasks'
    cmds:
      - task --list-all

  tidy:
    desc: 'Tidy all'
    run: once
    cmds:
      - go mod tidy
    sources:
      - '*.go'
      - go.mod
      - go.sum

  build:
    desc: Build the hyap7 binary
    deps: [tidy]
    cmds:
      - go build -o hyap7 .
    sources:
      - '*.go'
      - go.mod
      - go.sum
    generates:
      - hyap7

  run:
    desc: Run hyap7
    deps: [tidy]
    cmds:
      - go run .

  test:
    desc: Run tests
    deps: [tidy]
    cmds:
      - go test ./...

  build-wasm:
    desc: 'Compile hyap7 to WASM'
    deps: [tidy]
    cmds:
      - go tool booba-wasm-build -o web/app.wasm .
    sources:
      - '*.go'
      - go.mod
    generates:
      - web/app.wasm

  build-assets:
    desc: 'Populate web/ with wasm_exec.js, booba/, and ghostty-web/'
    deps: [tidy]
    cmds:
      - go tool booba-assets web/
    generates:
      - web/wasm_exec.js
      - web/booba/booba.js
      - web/ghostty-web/ghostty-web.js

  build-web:
    desc: 'Build WASM binary and web assets'
    deps:
      - build-wasm
      - build-assets

  serve:
    desc: 'Serve web/ locally on http://localhost:3000'
    deps: [build-web]
    cmds:
      - npx serve web

  clean:
    desc: 'Clean all build products'
    deps: [ clean-gifs ]
    cmds:
      - rm -f hyap7
      - rm -f web/app.wasm
      - rm -f web/wasm_exec.js
      - rm -rf web/booba
      - rm -rf web/ghostty-web

###############################################################################
# GIF Generation from VHS Cassettes

  deps-gifs:
    desc: 'Install dependencies for GIF generation'
    cmds:
      - go install github.com/charmbracelet/vhs@latest
      - brew install imagemagick

  validate-tapes:
    desc: 'Validate vhs tapes for GIF generation'
    cmds:
      - vhs validate ./etc/demo.tape
    sources:
      - ./etc/demo.tape

  build-gifs:
    desc: 'Build vhs cassette gifs'
    deps: [build, validate-tapes]
    cmds:
      - vhs --output ./etc/demo.gif ./etc/demo.tape
    sources:
      - ./etc/demo.tape
    generates:
      - ./etc/demo.gif

  clean-gifs:
    desc: 'Cleans vhs cassette gifs'
    cmds:
      - rm -f ./etc/demo.gif
